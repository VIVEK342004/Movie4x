<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie4x | Login & Signup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('images/hero_banner.png');
            background-size: cover;
            background-position: center;
        }
        .auth-box {
            background: rgba(11, 12, 16, 0.9);
            padding: 50px;
            border-radius: 10px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .auth-box h2 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: var(--primary-color);
            background: #444;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .auth-btn:hover {
            background: var(--primary-hover);
        }
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }
        .auth-switch span {
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .auth-switch span:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: #E50914;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box" id="loginBox">
            <h2>Sign In</h2>
            <div id="loginError" class="error-msg"></div>
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <div class="auth-switch">
                New to Movie4x? <span id="showSignup">Sign up now.</span>
            </div>
        </div>

        <div class="auth-box" id="signupBox" style="display: none;">
            <h2>Sign Up</h2>
            <div id="signupError" class="error-msg"></div>
            <form id="signupForm">
                <div class="input-group">
                    <input type="text" id="signupUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="email" id="signupEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
            <div class="auth-switch">
                Already have an account? <span id="showLogin">Sign in.</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('showSignup').addEventListener('click', () => {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('signupBox').style.display = 'block';
        });
        document.getElementById('showLogin').addEventListener('click', () => {
            document.getElementById('signupBox').style.display = 'none';
            document.getElementById('loginBox').style.display = 'block';
        });

        // Backend Integration
        const API_URL = 'http://localhost:5000/api/auth';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('movie4x_token', data.token);
                    localStorage.setItem('movie4x_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    const err = document.getElementById('loginError');
                    err.style.display = 'block';
                    err.textContent = data.message;
                }
            } catch (err) {
                console.error(err);
                // Fallback for demo without backend
                localStorage.setItem('movie4x_token', 'demo-token');
                localStorage.setItem('movie4x_user', JSON.stringify({username: 'DemoUser'}));
                window.location.href = 'index.html';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('movie4x_token', data.token);
                    localStorage.setItem('movie4x_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    const err = document.getElementById('signupError');
                    err.style.display = 'block';
                    err.textContent = data.message;
                }
            } catch (err) {
                console.error(err);
                // Fallback for demo
                localStorage.setItem('movie4x_token', 'demo-token');
                localStorage.setItem('movie4x_user', JSON.stringify({username}));
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
